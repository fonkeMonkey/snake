<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      color: #eee;
    }
    h1 {
      font-size: 2rem;
      letter-spacing: 0.2em;
      color: #4ade80;
      margin-bottom: 12px;
      text-transform: uppercase;
    }
    canvas {
      border: 2px solid #4ade80;
      border-radius: 4px;
      box-shadow: 0 0 20px rgba(74, 222, 128, 0.3);
    }
  </style>
</head>
<body>
  <h1>Snake</h1>
  <canvas id="game" width="400" height="400"></canvas>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const COLS = 20, ROWS = 20, CELL = 20;
    const BASE_SPEED = 150;

    let snake, dir, nextDir, food, gameOver, intervalId;

    function init() {
      snake = [
        { x: 10, y: 10 },
        { x: 9,  y: 10 },
        { x: 8,  y: 10 },
      ];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      gameOver = false;
      spawnFood();
      if (intervalId) clearInterval(intervalId);
      intervalId = setInterval(tick, BASE_SPEED);
    }

    function spawnFood() {
      const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
      let pos;
      do {
        pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
      } while (occupied.has(`${pos.x},${pos.y}`));
      food = pos;
    }

    function tick() {
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) { endGame(); return; }
      if (snake.some(s => s.x === head.x && s.y === head.y)) { endGame(); return; }

      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        spawnFood();
      } else {
        snake.pop();
      }
      draw();
    }

    function endGame() {
      gameOver = true;
      clearInterval(intervalId);
      draw();
    }

    function draw() {
      // Background
      ctx.fillStyle = '#0f0f1a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Grid lines
      ctx.strokeStyle = '#1e1e3a';
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke();
      }

      // Snake body
      snake.forEach((seg, i) => {
        ctx.fillStyle = i === 0 ? '#86efac' : `rgba(34, 197, 94, ${Math.max(0.4, 1 - i / snake.length * 0.6)})`;
        const pad = i === 0 ? 1 : 2;
        ctx.beginPath();
        ctx.roundRect(seg.x * CELL + pad, seg.y * CELL + pad, CELL - pad*2, CELL - pad*2, i === 0 ? 4 : 3);
        ctx.fill();
      });

      // Food
      ctx.fillStyle = '#ef4444';
      ctx.beginPath();
      ctx.arc(food.x * CELL + CELL/2, food.y * CELL + CELL/2, CELL/2 - 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath();
      ctx.arc(food.x * CELL + CELL/2 - 3, food.y * CELL + CELL/2 - 3, 3, 0, Math.PI * 2);
      ctx.fill();

      // Eyes on head
      const h = snake[0];
      ctx.fillStyle = '#0f0f1a';
      const cx = h.x * CELL + CELL/2 + dir.x * 4;
      const cy = h.y * CELL + CELL/2 + dir.y * 4;
      ctx.beginPath(); ctx.arc(cx + dir.y * 4, cy + dir.x * 4, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx - dir.y * 4, cy - dir.x * 4, 2.5, 0, Math.PI * 2); ctx.fill();
    }

    document.addEventListener('keydown', e => {
      const map = {
        ArrowUp:    { x: 0, y: -1 }, w: { x: 0, y: -1 }, W: { x: 0, y: -1 },
        ArrowDown:  { x: 0, y:  1 }, s: { x: 0, y:  1 }, S: { x: 0, y:  1 },
        ArrowLeft:  { x: -1, y: 0 }, a: { x: -1, y: 0 }, A: { x: -1, y: 0 },
        ArrowRight: { x: 1,  y: 0 }, d: { x: 1,  y: 0 }, D: { x: 1,  y: 0 },
      };
      const d = map[e.key];
      if (d && (d.x !== -dir.x || d.y !== -dir.y)) {
        nextDir = d;
        if (e.key.startsWith('Arrow')) e.preventDefault();
      }
    });

    init();
  </script>
</body>
</html>
