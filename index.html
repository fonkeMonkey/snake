<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230f0f1a'/><rect x='4' y='14' width='7' height='7' rx='2' fill='%2386efac'/><rect x='4' y='4' width='7' height='7' rx='2' fill='%2322c55e'/><rect x='13' y='4' width='7' height='7' rx='2' fill='%2322c55e'/><rect x='22' y='4' width='7' height='7' rx='2' fill='%2322c55e'/><rect x='22' y='14' width='7' height='7' rx='2' fill='%2322c55e'/><rect x='22' y='23' width='7' height='7' rx='2' fill='%2322c55e'/><circle cx='22' cy='7' r='1.5' fill='%230f0f1a'/><circle cx='26' cy='7' r='1.5' fill='%230f0f1a'/></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d1a;
      background-image: radial-gradient(ellipse 90% 60% at 50% 0%, #1a1a40 0%, #0d0d1a 70%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #eee;
    }
    h1 {
      font-size: 2.2rem;
      letter-spacing: 0.25em;
      color: var(--accent, #4ade80);
      margin-bottom: 4px;
      text-transform: uppercase;
      transition: color 0.3s;
      text-shadow: 0 0 20px var(--glow, rgba(74,222,128,0.5));
    }
    #scoreboard {
      display: flex;
      gap: 32px;
      margin-bottom: 8px;
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      color: #888;
    }
    #scoreboard span {
      color: #fff;
      font-weight: bold;
      font-size: 1.1rem;
      display: inline-block;
      transition: transform 0.1s;
    }
    @keyframes scorePop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.7); color: var(--accent, #4ade80); }
      100% { transform: scale(1); }
    }
    #score.pop { animation: scorePop 0.22s ease-out; }
    #settings-panel {
      width: 400px;
      background: rgba(15,15,35,0.8);
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 9px 12px 11px;
      margin-bottom: 8px;
      backdrop-filter: blur(4px);
    }
    #settings-label {
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 7px;
    }
    #meta {
      display: flex;
      gap: 6px;
      align-items: center;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      color: #888;
      flex-wrap: wrap;
    }
    .meta-btn {
      background: #1a1a3a;
      border: 1px solid #4a4a6a;
      color: #ddd;
      font-family: 'Courier New', monospace;
      font-size: 0.72rem;
      padding: 5px 11px;
      border-radius: 5px;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .meta-btn:hover { border-color: var(--accent, #4ade80); color: var(--accent, #4ade80); background: #1e1e40; }
    .meta-btn.on {
      border-color: var(--accent, #4ade80);
      color: var(--accent, #4ade80);
      background: rgba(74,222,128,0.08);
    }
    .meta-btn.on:hover { background: rgba(74,222,128,0.15); }
    #difficulty-label { color: #facc15; font-weight: bold; letter-spacing: 0.1em; font-size: 0.72rem; }
    canvas {
      border: 2px solid var(--accent, #4ade80);
      border-radius: 4px;
      box-shadow: 0 0 20px var(--glow, rgba(74,222,128,0.3));
      display: block;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    #dpad {
      display: none;
      margin-top: 16px;
      position: relative;
      width: 120px;
      height: 120px;
    }
    #dpad button {
      position: absolute;
      width: 36px; height: 36px;
      background: #1e1e3a;
      border: 1px solid var(--accent, #4ade80);
      border-radius: 6px;
      color: var(--accent, #4ade80);
      font-size: 1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      user-select: none; -webkit-user-select: none;
    }
    #dpad button:active { background: #2a2a5a; }
    #btn-up    { top: 0;    left: 42px; }
    #btn-down  { bottom: 0; left: 42px; }
    #btn-left  { top: 42px; left: 0; }
    #btn-right { top: 42px; right: 0; }
    #instructions { margin-top: 8px; font-size: 0.68rem; color: #999; letter-spacing: 0.05em; }
    #stamina-wrap {
      width: 400px;
      margin-top: 7px;
    }
    #stamina-label {
      font-size: 0.62rem;
      color: #999;
      letter-spacing: 0.06em;
      margin-bottom: 3px;
      transition: color 0.15s;
    }
    #shift-key {
      display: inline-block;
      background: #2a2a4a;
      border: 1px solid #555;
      border-bottom: 2px solid #333;
      border-radius: 3px;
      padding: 0 5px;
      font-family: 'Courier New', monospace;
      font-size: 0.62rem;
      color: #ccc;
      line-height: 1.5;
    }
    #stamina-track {
      background: #1e1e3a;
      height: 6px;
      border-radius: 3px;
      border: 1px solid #2a2a4a;
      overflow: hidden;
    }
    #stamina-fill {
      height: 100%;
      width: 100%;
      background: #facc15;
      border-radius: 3px;
      transition: background 0.2s;
    }
    #color-picker {
      display: flex; gap: 6px; margin-top: 7px; align-items: center;
    }
    #color-picker::before {
      content: 'COLOR'; font-size: 0.6rem; color: #999; letter-spacing: 0.06em; margin-right: 2px;
    }
    .swatch {
      width: 16px; height: 16px; border-radius: 4px; cursor: pointer;
      border: 2px solid transparent; transition: border-color 0.15s, transform 0.1s;
    }
    .swatch:hover { transform: scale(1.2); }
    .swatch.active { border-color: #fff; }
    @media (hover: none) and (pointer: coarse) {
      #dpad { display: block; }
      #instructions { display: none; }
    }
  </style>
</head>
<body>
  <h1>Snake</h1>
  <div id="scoreboard">
    SCORE: <span id="score">0</span>
    &nbsp;&nbsp;
    BEST: <span id="high-score">0</span>
  </div>
  <div id="settings-panel">
    <div id="settings-label">⚙ Settings</div>
    <div id="meta">
      <span id="difficulty-label">MEDIUM</span>
      <button class="meta-btn on" id="walls-toggle">WALLS: ON</button>
      <button class="meta-btn on" id="maze-toggle">MAZE: ON</button>
      <button class="meta-btn on" id="ai-toggle">AI: ON</button>
      <button class="meta-btn" id="portal-toggle">PORTALS: OFF</button>
      <button class="meta-btn" id="timeattack-toggle">TIME: OFF</button>
      <button class="meta-btn" id="dark-toggle">DARK: OFF</button>
      <button class="meta-btn" id="theme-toggle">THEME: NEON</button>
      <button class="meta-btn" id="mode-toggle">1 PLAYER</button>
    </div>
  </div>
  <canvas id="game" width="400" height="400"></canvas>
  <div id="stamina-wrap">
    <div id="stamina-label">SPRINT — <span style="color:#888">hold</span> <kbd id="shift-key">SHIFT</kbd> <span style="color:#555">to boost speed</span></div>
    <div id="stamina-track"><div id="stamina-fill"></div></div>
  </div>
  <div id="color-picker"></div>
  <div id="dpad">
    <button id="btn-up">▲</button>
    <button id="btn-left">◀</button>
    <button id="btn-right">▶</button>
    <button id="btn-down">▼</button>
  </div>
  <div id="instructions">WASD / ARROWS &nbsp;|&nbsp; SHIFT = boost &nbsp;|&nbsp; P = pause &nbsp;|&nbsp; SPACE / ENTER = restart</div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl      = document.getElementById('score');
    const highScoreEl  = document.getElementById('high-score');
    const diffLabel    = document.getElementById('difficulty-label');
    const wallsBtn     = document.getElementById('walls-toggle');
    const mazeBtn      = document.getElementById('maze-toggle');
    const aiBtn        = document.getElementById('ai-toggle');
    const portalBtn    = document.getElementById('portal-toggle');
    const timeBtn      = document.getElementById('timeattack-toggle');
    const darkBtn      = document.getElementById('dark-toggle');
    const themeBtn     = document.getElementById('theme-toggle');
    const modeBtn      = document.getElementById('mode-toggle');

    const COLS = 20, ROWS = 20, CELL = 20;
    const MIN_SPEED = 60;
    const STAMINA_MAX = 100;

    // ── Themes ───────────────────────────────────────────────────
    const THEMES = [
      { name: 'NEON',  accent: '#4ade80', glow: 'rgba(74,222,128,0.3)',  bg: '#0f0f1a', grid: '#1e1e3a', head: '#86efac', body: '34,197,94'  },
      { name: 'RETRO', accent: '#22c55e', glow: 'rgba(34,197,94,0.25)',  bg: '#0a120a', grid: '#112211', head: '#4ade80', body: '20,160,60'  },
      { name: 'FIRE',  accent: '#f97316', glow: 'rgba(249,115,22,0.3)',  bg: '#130800', grid: '#251000', head: '#fbbf24', body: '239,68,68'  },
      { name: 'ICE',   accent: '#38bdf8', glow: 'rgba(56,189,248,0.3)',  bg: '#020e1a', grid: '#061828', head: '#bae6fd', body: '56,189,248' },
    ];
    let themeIdx = parseInt(localStorage.getItem('snakeTheme') || '0');

    function applyTheme() {
      const t = THEMES[themeIdx];
      document.documentElement.style.setProperty('--accent', t.accent);
      document.documentElement.style.setProperty('--glow', t.glow);
      themeBtn.textContent = `THEME: ${t.name}`;
    }

    // ── Difficulties ─────────────────────────────────────────────
    const DIFFICULTIES = {
      easy:   { label: 'EASY',   speed: 200, step: 5  },
      medium: { label: 'MEDIUM', speed: 150, step: 10 },
      hard:   { label: 'HARD',   speed: 90,  step: 15 },
    };
    const DIFF_ORDER = ['easy', 'medium', 'hard'];
    let difficulty = 'medium';
    let wallsOn = true;
    let twoPlayer = false;
    let mazeMode = true;
    let aiMode = true;
    let portalsOn = false;
    let timeAttack = false;
    let darkMode = false;

    // ── State ─────────────────────────────────────────────────────
    let snake, dir, nextDir;
    let snake2, dir2, nextDir2;
    let food, powerUp, obstacles;
    let score, highScore, foodCount;
    let gameOver, paused, shielded, shield2;
    let intervalId, countdownVal = null;
    let flashFrames = 0, deathFrames = 0;
    let shakeFrames = 0;
    let particles = [];
    let milestone = null; // { text, alpha }
    let winner = null; // for 2p
    let stamina = STAMINA_MAX, shiftHeld = false;
    let needsStart = true; // wait for first user gesture before playing audio
    let combo = 1, comboTimer = null, comboAlpha = 0;
    let toastQueue = [];
    let scorePopups = [];
    let snakeAI, dirAI, nextDirAI;
    let portals = [];
    let timeLeft = 60, timeInterval = null;
    let extraFoods = [];
    let customSnakeRgb = localStorage.getItem('snakeColor') || '34,197,94';
    let customHead = localStorage.getItem('snakeHead') || '#86efac';

    const ACHIEVEMENTS = [
      { id:'first_blood',  label:'First Blood',   desc:'Eat your first food',          icon:'🍎' },
      { id:'speed_demon',  label:'Speed Demon',   desc:'Use boost 10 times',            icon:'⚡' },
      { id:'big_eater',    label:'Big Eater',     desc:'Eat 20 foods in one game',      icon:'🐍' },
      { id:'combo_king',   label:'Combo King',    desc:'Hit a ×5 combo',                icon:'🔥' },
      { id:'untouchable',  label:'Untouchable',   desc:'Score 200+ without dying',      icon:'🛡️' },
      { id:'power_junkie', label:'Power Junkie',  desc:'Collect 5 power-ups in one game', icon:'💊' },
      { id:'centurion',    label:'Centurion',     desc:'Score 100 points',              icon:'💯' },
      { id:'maze_runner',  label:'Maze Runner',   desc:'Score 50 in Maze mode',         icon:'🌀' },
    ];

    let boostUses = 0, powerUpsCollected = 0;

    function getUnlocked() {
      try { return new Set(JSON.parse(localStorage.getItem('snakeAch') || '[]')); } catch { return new Set(); }
    }
    function unlockAchievement(id) {
      const unlocked = getUnlocked();
      if (unlocked.has(id)) return;
      unlocked.add(id);
      localStorage.setItem('snakeAch', JSON.stringify([...unlocked]));
      const ach = ACHIEVEMENTS.find(a => a.id === id);
      if (ach) showToast(`${ach.icon} ${ach.label}: ${ach.desc}`);
    }
    function showToast(msg) {
      toastQueue.push({ msg, alpha: 1 });
    }
    function checkAchievements() {
      if (foodCount >= 1)          unlockAchievement('first_blood');
      if (foodCount >= 20)         unlockAchievement('big_eater');
      if (combo >= 5)              unlockAchievement('combo_king');
      if (score >= 100)            unlockAchievement('centurion');
      if (score >= 200)            unlockAchievement('untouchable');
      if (powerUpsCollected >= 5)  unlockAchievement('power_junkie');
      if (mazeMode && score >= 50) unlockAchievement('maze_runner');
    }

    // ── Color picker setup ────────────────────────────────────────
    const SNAKE_COLORS = [
      { rgb:'34,197,94',   head:'#86efac', hex:'#22c55e' },
      { rgb:'56,189,248',  head:'#bae6fd', hex:'#38bdf8' },
      { rgb:'249,115,22',  head:'#fbbf24', hex:'#f97316' },
      { rgb:'239,68,68',   head:'#fca5a5', hex:'#ef4444' },
      { rgb:'168,85,247',  head:'#d8b4fe', hex:'#a855f7' },
      { rgb:'236,72,153',  head:'#f9a8d4', hex:'#ec4899' },
      { rgb:'234,179,8',   head:'#fde68a', hex:'#eab308' },
      { rgb:'20,184,166',  head:'#99f6e4', hex:'#14b8a6' },
    ];
    (function buildPicker() {
      const picker = document.getElementById('color-picker');
      SNAKE_COLORS.forEach((c, i) => {
        const sw = document.createElement('div');
        sw.className = 'swatch' + (c.rgb === customSnakeRgb ? ' active' : '');
        sw.style.background = c.hex;
        sw.addEventListener('click', () => {
          customSnakeRgb = c.rgb; customHead = c.head;
          localStorage.setItem('snakeColor', c.rgb);
          localStorage.setItem('snakeHead', c.head);
          document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
          sw.classList.add('active');
        });
        picker.appendChild(sw);
      });
    })();

    // ── Audio ─────────────────────────────────────────────────────
    let audioCtx;
    function getAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      // Resume if suspended (browser blocks audio until first user gesture)
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }
    // On first interaction: unlock audio AND start the game
    function onFirstGesture() {
      if (!needsStart) return;
      needsStart = false;
      getAudio(); // creates + resumes AudioContext inside user gesture
      startCountdown();
      document.removeEventListener('keydown', onFirstGesture);
      canvas.removeEventListener('pointerdown', onFirstGesture);
    }
    document.addEventListener('keydown', onFirstGesture);
    canvas.addEventListener('pointerdown', onFirstGesture);

    function playTone(freq1, freq2, dur, type = 'sine', vol = 0.15) {
      try {
        const ac = getAudio();
        const o = ac.createOscillator(), g = ac.createGain();
        o.type = type;
        o.connect(g); g.connect(ac.destination);
        o.frequency.setValueAtTime(freq1, ac.currentTime);
        o.frequency.exponentialRampToValueAtTime(freq2, ac.currentTime + dur);
        g.gain.setValueAtTime(vol, ac.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
        o.start(); o.stop(ac.currentTime + dur);
      } catch(_) {}
    }
    const playEat      = () => playTone(440, 880, 0.1);
    const playDeath    = () => playTone(300, 60, 0.4, 'sawtooth', 0.2);
    const playPowerUp  = () => playTone(600, 1200, 0.15);
    const playCountdown = (n) => playTone(n === 0 ? 880 : 440, n === 0 ? 1200 : 440, 0.1);

    // ── Speed / Stamina ───────────────────────────────────────────
    function getBaseSpeed() {
      const diff = DIFFICULTIES[difficulty];
      return Math.max(MIN_SPEED, diff.speed - Math.floor(foodCount / 5) * diff.step);
    }
    function getActiveSpeed() {
      if (shiftHeld && stamina > 0) return Math.max(Math.floor(MIN_SPEED / 2), Math.floor(getBaseSpeed() / 2));
      return getBaseSpeed();
    }
    function restartInterval(overrideMs) {
      if (intervalId) clearInterval(intervalId);
      intervalId = setInterval(tick, overrideMs !== undefined ? overrideMs : getActiveSpeed());
    }
    function updateStaminaBar() {
      const fill = document.getElementById('stamina-fill');
      const label = document.getElementById('stamina-label');
      fill.style.width = stamina + '%';
      fill.style.background = stamina > 60 ? '#facc15' : stamina > 25 ? '#f97316' : '#ef4444';
      label.style.color = (shiftHeld && stamina > 0) ? '#facc15' : '#999';
    }

    // ── Init ──────────────────────────────────────────────────────
    function init() {
      snake  = [{ x:10,y:10 }, { x:9,y:10 }, { x:8,y:10 }];
      dir    = { x:1, y:0 };
      nextDir = { x:1, y:0 };
      if (twoPlayer) {
        snake2   = [{ x:10,y:12 }, { x:9,y:12 }, { x:8,y:12 }];
        dir2     = { x:1, y:0 };
        nextDir2 = { x:1, y:0 };
      }
      score = 0; foodCount = 0;
      gameOver = false; paused = false;
      shielded = false; shield2 = false;
      flashFrames = 0; deathFrames = 0; shakeFrames = 0;
      particles = []; powerUp = null; obstacles = [];
      milestone = null; winner = null;
      if (mazeMode) generateMaze();
      // AI
      if (aiMode) respawnAI(); else snakeAI = null;
      // Portals
      portals = [];
      // Extra foods
      extraFoods = [];
      // Time attack
      if (timeInterval) { clearInterval(timeInterval); timeInterval = null; }
      stamina = STAMINA_MAX; shiftHeld = false;
      updateStaminaBar();
      combo = 1; comboAlpha = 0;
      if (comboTimer) { clearTimeout(comboTimer); comboTimer = null; }
      boostUses = 0; powerUpsCollected = 0; toastQueue = []; scorePopups = [];
      highScore = parseInt(localStorage.getItem('snakeHigh') || '0');
      scoreEl.textContent = score;
      highScoreEl.textContent = highScore;
      spawnFood();
      if (intervalId) clearInterval(intervalId);
      if (needsStart) { draw(); } else { startCountdown(); }
    }

    function startCountdown() {
      countdownVal = 3;
      draw(); drawCountdown(countdownVal);
      playCountdown(countdownVal);
      const cd = setInterval(() => {
        countdownVal--;
        draw(); drawCountdown(countdownVal);
        playCountdown(countdownVal);
        if (countdownVal <= 0) {
          clearInterval(cd);
          countdownVal = null;
          if (portalsOn) spawnPortals();
          if (timeAttack) startTimeAttack();
          spawnExtraFoods();
          restartInterval();
        }
      }, 800);
    }

    // ── Spawn helpers ─────────────────────────────────────────────
    function occupiedSet() {
      const s = new Set(snake.map(s => `${s.x},${s.y}`));
      if (twoPlayer) snake2.forEach(s2 => s.add(`${s2.x},${s2.y}`));
      if (snakeAI) snakeAI.forEach(s2 => s.add(`${s2.x},${s2.y}`));
      obstacles.forEach(o => s.add(`${o.x},${o.y}`));
      portals.forEach(p => s.add(`${p.x},${p.y}`));
      extraFoods.forEach(f => s.add(`${f.x},${f.y}`));
      return s;
    }

    function randomEmpty() {
      const occ = occupiedSet();
      occ.add(`${food.x},${food.y}`);
      let pos;
      do { pos = { x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS) }; }
      while (occ.has(`${pos.x},${pos.y}`));
      return pos;
    }

    function spawnFood() {
      const occ = new Set(snake.map(s => `${s.x},${s.y}`));
      if (twoPlayer) snake2.forEach(s2 => occ.add(`${s2.x},${s2.y}`));
      obstacles.forEach(o => occ.add(`${o.x},${o.y}`));
      let pos;
      do { pos = { x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS) }; }
      while (occ.has(`${pos.x},${pos.y}`));
      food = pos;
    }

    function maybePowerUp() {
      if (!powerUp && Math.random() < 0.2) {
        const types = ['slow','bonus','shield','shrink'];
        powerUp = { ...randomEmpty(), type: types[Math.floor(Math.random()*types.length)], ttl: 80 };
      }
    }

    function maybeObstacle() {
      if (!mazeMode && foodCount > 0 && foodCount % 3 === 0 && obstacles.length < 12) {
        obstacles.push(randomEmpty());
      }
    }

    function generateMaze() {
      obstacles = [];
      const safe = new Set();
      // Keep center area and spawn zones clear
      for (let dy = -3; dy <= 3; dy++) for (let dx = -3; dx <= 3; dx++) safe.add(`${10+dx},${10+dy}`);
      for (let dy = -2; dy <= 2; dy++) for (let dx = -2; dx <= 2; dx++) safe.add(`${10+dx},${12+dy}`);
      // Add ~25 random wall segments in clusters
      const wallCount = 22 + Math.floor(Math.random() * 8);
      let attempts = 0;
      while (obstacles.length < wallCount && attempts++ < 500) {
        const x = 1 + Math.floor(Math.random() * (COLS - 2));
        const y = 1 + Math.floor(Math.random() * (ROWS - 2));
        const key = `${x},${y}`;
        if (!safe.has(key) && !obstacles.some(o => o.x === x && o.y === y)) {
          obstacles.push({ x, y });
        }
      }
    }

    // ── AI Snake ──────────────────────────────────────────────────
    const AI_DIRS = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];

    function aiOccupied() {
      const s = new Set();
      // Exclude tail (it moves away each tick) to avoid false dead-ends
      snakeAI.slice(0, -1).forEach(c => s.add(`${c.x},${c.y}`));
      snake.slice(0, -1).forEach(c => s.add(`${c.x},${c.y}`));
      obstacles.forEach(o => s.add(`${o.x},${o.y}`));
      return s;
    }

    function aiWrap(nx, ny) {
      if (wallsOn && (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS)) return null;
      return { x: (nx + COLS) % COLS, y: (ny + ROWS) % ROWS };
    }

    // BFS: returns first direction toward target, or null if unreachable
    function bfsToward(from, target, occ) {
      const start = `${from.x},${from.y}`;
      const goal  = `${target.x},${target.y}`;
      if (start === goal) return null;
      const queue = [{ x: from.x, y: from.y, first: null }];
      const visited = new Set([start]);
      while (queue.length) {
        const cur = queue.shift();
        for (const d of AI_DIRS) {
          const nb = aiWrap(cur.x + d.x, cur.y + d.y);
          if (!nb) continue;
          const key = `${nb.x},${nb.y}`;
          if (visited.has(key) || occ.has(key)) continue;
          const firstDir = cur.first || d;
          if (key === goal) return firstDir;
          visited.add(key);
          queue.push({ x: nb.x, y: nb.y, first: firstDir });
        }
      }
      return null;
    }

    // Flood-fill: count reachable cells from (sx,sy) — used for survival
    function floodFill(sx, sy, occ) {
      const visited = new Set();
      const queue = [{ x: sx, y: sy }];
      visited.add(`${sx},${sy}`);
      while (queue.length) {
        const cur = queue.shift();
        for (const d of AI_DIRS) {
          const nb = aiWrap(cur.x + d.x, cur.y + d.y);
          if (!nb) continue;
          const key = `${nb.x},${nb.y}`;
          if (!visited.has(key) && !occ.has(key)) {
            visited.add(key);
            queue.push(nb);
          }
        }
      }
      return visited.size;
    }

    function aiStep() {
      if (!snakeAI || snakeAI.length === 0) return;
      const head = snakeAI[0];
      const occ  = aiOccupied();

      // 1. Try BFS toward food
      let chosen = bfsToward(head, food, occ);

      // 2. Fallback: pick the open direction with the most reachable space
      if (!chosen) {
        const candidates = AI_DIRS
          .filter(d => !(d.x === -dirAI.x && d.y === -dirAI.y))
          .map(d => {
            const nb = aiWrap(head.x + d.x, head.y + d.y);
            if (!nb || occ.has(`${nb.x},${nb.y}`)) return { d, space: -1 };
            return { d, space: floodFill(nb.x, nb.y, occ) };
          })
          .filter(c => c.space >= 0)
          .sort((a, b) => b.space - a.space);
        chosen = candidates.length ? candidates[0].d : dirAI;
      }

      nextDirAI = chosen;
    }
    function tickAI() {
      if (!snakeAI) return;
      aiStep();
      dirAI = nextDirAI;
      let nx = snakeAI[0].x + dirAI.x, ny = snakeAI[0].y + dirAI.y;
      if (wallsOn) {
        if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) { respawnAI(); return; }
      } else {
        nx = (nx + COLS) % COLS; ny = (ny + ROWS) % ROWS;
      }
      if (snakeAI.some(s => s.x === nx && s.y === ny) ||
          snake.some(s => s.x === nx && s.y === ny) ||
          obstacles.some(o => o.x === nx && o.y === ny)) { respawnAI(); return; }
      const aiHead = {x: nx, y: ny};
      snakeAI.unshift(aiHead);
      if (aiHead.x === food.x && aiHead.y === food.y) {
        spawnFood(); playEat(); flashFrames = 2;
        spawnParticles(aiHead.x, aiHead.y, '#f97316');
      } else {
        snakeAI.pop();
      }
    }
    function respawnAI() {
      snakeAI = [{x:10,y:16},{x:9,y:16},{x:8,y:16}];
      dirAI = {x:1,y:0}; nextDirAI = {x:1,y:0};
    }

    // ── Portals ───────────────────────────────────────────────────
    const PORTAL_COLORS = ['#a78bfa','#fb923c'];
    function spawnPortals() {
      portals = [];
      for (let p = 0; p < 2; p++) {
        for (let side = 0; side < 2; side++) {
          const pos = randomEmpty();
          portals.push({ ...pos, pair: p, side, color: PORTAL_COLORS[p] });
        }
      }
    }
    function checkPortal(nx, ny, dx, dy) {
      const portal = portals.find(p => p.x === nx && p.y === ny);
      if (!portal) return null;
      const exit = portals.find(p => p.pair === portal.pair && p.side !== portal.side);
      if (!exit) return null;
      // Exit one cell beyond the exit portal in the direction of travel
      let ex = exit.x + dx, ey = exit.y + dy;
      if (!wallsOn) { ex = (ex + COLS) % COLS; ey = (ey + ROWS) % ROWS; }
      // If that step would hit a wall, land on the portal itself instead
      if (wallsOn && (ex < 0 || ex >= COLS || ey < 0 || ey >= ROWS)) {
        ex = exit.x; ey = exit.y;
      }
      return { x: ex, y: ey };
    }

    // ── Time Attack ───────────────────────────────────────────────
    function startTimeAttack() {
      timeLeft = 60;
      if (timeInterval) clearInterval(timeInterval);
      timeInterval = setInterval(() => {
        if (paused || gameOver || countdownVal !== null) return;
        timeLeft--;
        if (timeLeft <= 0) {
          clearInterval(timeInterval); timeInterval = null;
          winner = null;
          triggerDeath();
        }
      }, 1000);
    }

    // ── Extra Foods ───────────────────────────────────────────────
    const EXTRA_FOOD_TYPES = [
      { type:'golden', color:'#facc15', pts:25, ttl: null },
      { type:'cyan',   color:'#22d3ee', pts:50, ttl: 40  },
    ];
    function spawnExtraFoods() {
      extraFoods = [];
      EXTRA_FOOD_TYPES.forEach(ft => {
        extraFoods.push({ ...randomEmpty(), ...ft });
      });
    }

    // ── Score Card ────────────────────────────────────────────────
    function downloadScoreCard() {
      const oc = document.createElement('canvas');
      oc.width = 320; oc.height = 180;
      const ox = oc.getContext('2d');
      ox.fillStyle = '#0f0f1a';
      ox.fillRect(0, 0, oc.width, oc.height);
      ox.strokeStyle = THEMES[themeIdx].accent;
      ox.lineWidth = 3;
      ox.strokeRect(4, 4, oc.width-8, oc.height-8);
      ox.textAlign = 'center';
      ox.fillStyle = THEMES[themeIdx].accent;
      ox.font = 'bold 28px Courier New';
      ox.fillText('SNAKE', oc.width/2, 44);
      ox.fillStyle = '#eee';
      ox.font = 'bold 20px Courier New';
      ox.fillText(`SCORE: ${score}`, oc.width/2, 82);
      ox.fillStyle = '#888';
      ox.font = '13px Courier New';
      ox.fillText(`BEST: ${highScore}`, oc.width/2, 106);
      ox.fillText(`DIFFICULTY: ${DIFFICULTIES[difficulty].label}`, oc.width/2, 126);
      if (mazeMode) ox.fillText('MAZE MODE', oc.width/2, 144);
      if (timeAttack) ox.fillText('TIME ATTACK', oc.width/2, 144);
      ox.fillStyle = '#444';
      ox.font = '10px Courier New';
      ox.fillText('fonkemonkey.github.io/snake', oc.width/2, 166);
      const link = document.createElement('a');
      link.download = `snake-score-${score}.png`;
      link.href = oc.toDataURL();
      link.click();
    }

    // ── Particle burst ────────────────────────────────────────────
    function spawnParticles(x, y, color) {
      for (let i = 0; i < 10; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 2.5;
        particles.push({
          x: x * CELL + CELL/2, y: y * CELL + CELL/2,
          vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
          r: 3 + Math.random() * 2, alpha: 1, color,
        });
      }
    }

    function spawnScorePopup(x, y, text, color = '#fff') {
      scorePopups.push({ x: x*CELL+CELL/2, y: y*CELL - 2, text, color, alpha: 1, vy: -0.9 });
    }
    function bumpScore() {
      scoreEl.classList.remove('pop');
      void scoreEl.offsetWidth;
      scoreEl.classList.add('pop');
    }

    function updateParticles() {
      particles = particles.filter(p => p.alpha > 0.05);
      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        p.vy += 0.08;
        p.alpha -= 0.045;
        p.r *= 0.97;
      });
    }

    // ── Milestone messages ────────────────────────────────────────
    const MILESTONE_MSGS = {
      50:  'NICE!', 100: 'ON FIRE!', 200: 'UNSTOPPABLE!',
      350: 'LEGENDARY!', 500: 'IMPOSSIBLE!',
    };
    function checkMilestone(newScore) {
      const msg = MILESTONE_MSGS[newScore];
      if (msg) milestone = { text: msg, alpha: 1 };
    }

    // ── Move helper ───────────────────────────────────────────────
    function moveSnake(snk, d, isP1) {
      let nx = snk[0].x + d.x, ny = snk[0].y + d.y;
      const shld = isP1 ? shielded : shield2;

      // Portal check BEFORE wall check — portals never kill directly
      const teleport = checkPortal(nx, ny, d.x, d.y);
      if (teleport) {
        snk.unshift(teleport);
        return teleport;
      }

      if (wallsOn) {
        if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) {
          if (shld) { if (isP1) shielded = false; else shield2 = false; return 'bounce'; }
          return 'dead';
        }
      } else {
        nx = (nx + COLS) % COLS; ny = (ny + ROWS) % ROWS;
      }

      const head = { x: nx, y: ny };
      if (snk.some(s => s.x === nx && s.y === ny)) {
        if (shld) { if (isP1) shielded = false; else shield2 = false; return 'bounce'; }
        return 'dead';
      }
      if (obstacles.some(o => o.x === nx && o.y === ny)) {
        if (shld) { if (isP1) shielded = false; else shield2 = false; return 'bounce'; }
        return 'dead';
      }
      // cross-snake collision (2p)
      if (twoPlayer) {
        const other = isP1 ? snake2 : snake;
        if (other.some(s => s.x === nx && s.y === ny)) {
          if (shld) { if (isP1) shielded = false; else shield2 = false; return 'bounce'; }
          return 'dead';
        }
      }
      snk.unshift(head);
      return head;
    }

    // ── Tick ──────────────────────────────────────────────────────
    function tick() {
      if (paused || gameOver || countdownVal !== null) return;

      dir  = nextDir;
      if (twoPlayer) dir2 = nextDir2;

      const r1 = moveSnake(snake, dir, true);
      if (r1 === 'dead') { winner = twoPlayer ? 'P2' : null; triggerDeath(); return; }
      if (r1 === 'bounce') { /* skip grow */ } else {
        handleHead(snake, r1, true);
      }

      if (twoPlayer) {
        const r2 = moveSnake(snake2, dir2, false);
        if (r2 === 'dead') { winner = 'P1'; triggerDeath(); return; }
        if (r2 !== 'bounce') handleHead(snake2, r2, false);
      }

      if (powerUp) {
        powerUp.ttl--;
        if (powerUp.ttl <= 0) powerUp = null;
      }

      // AI tick
      if (aiMode && snakeAI) tickAI();

      // Extra foods TTL
      extraFoods.forEach(f => { if (f.ttl !== null) f.ttl--; });
      extraFoods = extraFoods.filter(f => f.ttl === null || f.ttl > 0);
      // Respawn missing extra foods
      while (extraFoods.length < EXTRA_FOOD_TYPES.length) {
        const ft = EXTRA_FOOD_TYPES[extraFoods.length];
        try { extraFoods.push({ ...randomEmpty(), ...ft }); } catch { break; }
      }

      // Stamina: drain while boosting, recharge otherwise
      if (shiftHeld && stamina > 0) {
        stamina = Math.max(0, stamina - 2.5);
        if (stamina === 0) restartInterval(); // drop boost speed
      } else if (!shiftHeld && stamina < STAMINA_MAX) {
        stamina = Math.min(STAMINA_MAX, stamina + 1);
      }
      updateStaminaBar();

      updateParticles();
      if (milestone) {
        milestone.alpha -= 0.018;
        if (milestone.alpha <= 0) milestone = null;
      }
      if (comboAlpha > 0) comboAlpha = Math.max(0, comboAlpha - 0.015);
      toastQueue.forEach(t => t.alpha = Math.max(0, t.alpha - 0.008));
      toastQueue = toastQueue.filter(t => t.alpha > 0);
      scorePopups.forEach(p => { p.y += p.vy; p.alpha -= 0.022; });
      scorePopups = scorePopups.filter(p => p.alpha > 0);
      if (flashFrames > 0) flashFrames--;
      draw();
    }

    function handleHead(snk, head, isP1) {
      // food
      if (head.x === food.x && head.y === food.y) {
        // Combo multiplier
        if (comboTimer) clearTimeout(comboTimer);
        else combo = 1; // first eat resets (handled below)
        comboAlpha = 1;
        comboTimer = setTimeout(() => { combo = 1; comboTimer = null; comboAlpha = 0; }, 3000);
        score += 10 * combo;
        spawnScorePopup(head.x, head.y, `+${10 * combo}`, THEMES[themeIdx].accent);
        combo = Math.min(combo + 1, 8);
        foodCount++;
        checkMilestone(score);
        checkAchievements();
        scoreEl.textContent = score;
        bumpScore();
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('snakeHigh', highScore);
          highScoreEl.textContent = highScore;
        }
        spawnFood();
        maybePowerUp();
        maybeObstacle();
        playEat();
        flashFrames = 3;
        spawnParticles(head.x, head.y, THEMES[themeIdx].accent);
        if (foodCount % 5 === 0) restartInterval();
      } else {
        snk.pop();
      }
      // extra foods
      const eidx = extraFoods.findIndex(f => f.x === head.x && f.y === head.y);
      if (eidx !== -1) {
        const ef = extraFoods[eidx];
        score += ef.pts * combo;
        spawnScorePopup(head.x, head.y, `+${ef.pts * combo}`, ef.color);
        checkMilestone(score); checkAchievements();
        scoreEl.textContent = score;
        bumpScore();
        if (score > highScore) { highScore = score; localStorage.setItem('snakeHigh', highScore); highScoreEl.textContent = highScore; }
        spawnParticles(head.x, head.y, ef.color);
        playEat();
        extraFoods.splice(eidx, 1);
      }
      // power-up
      if (powerUp && head.x === powerUp.x && head.y === powerUp.y) {
        playPowerUp();
        powerUpsCollected++;
        checkAchievements();
        spawnParticles(head.x, head.y, powerUpColor(powerUp.type));
        if (powerUp.type === 'slow') {
          restartInterval(Math.min(300, getBaseSpeed() + 80));
          setTimeout(() => { if (!gameOver) restartInterval(); }, 5000);
        } else if (powerUp.type === 'bonus') {
          score += 30; scoreEl.textContent = score;
          if (score > highScore) {
            highScore = score;
            localStorage.setItem('snakeHigh', highScore);
            highScoreEl.textContent = highScore;
          }
        } else if (powerUp.type === 'shield') {
          if (isP1) shielded = true; else shield2 = true;
        } else if (powerUp.type === 'shrink') {
          const snk = isP1 ? snake : snake2;
          const removed = Math.min(3, snk.length - 1);
          snk.splice(snk.length - removed, removed);
          // Spawn shrink particles on each removed tail position
          for (let i = 0; i < removed; i++) spawnParticles(snk[snk.length - 1].x, snk[snk.length - 1].y, '#f472b6');
        }
        powerUp = null;
      }
    }

    function powerUpColor(type) {
      if (type === 'slow')   return '#38bdf8';
      if (type === 'bonus')  return '#facc15';
      if (type === 'shrink') return '#f472b6';
      return '#a78bfa'; // shield
    }

    // ── Death ─────────────────────────────────────────────────────
    function triggerDeath() {
      playDeath();
      deathFrames = 6;
      shakeFrames = 10;
      let f = 0;
      const anim = setInterval(() => {
        f++; draw();
        if (f >= deathFrames) { clearInterval(anim); endGame(); }
      }, 60);
      clearInterval(intervalId);
    }

    function endGame() {
      gameOver = true;
      checkLeaderboard();
      draw();
      drawOverlay();
    }

    // ── Leaderboard ───────────────────────────────────────────────
    function getBoard() {
      try { return JSON.parse(localStorage.getItem('snakeBoard') || '[]'); } catch { return []; }
    }
    function saveBoard(b) { localStorage.setItem('snakeBoard', JSON.stringify(b)); }

    function checkLeaderboard() {
      if (twoPlayer) return;
      const board = getBoard();
      if (board.length < 5 || score > board[board.length - 1].score) {
        const initials = (prompt(`Score ${score}! Enter initials (3 chars):`) || 'AAA').slice(0,3).toUpperCase();
        board.push({ score, initials });
        board.sort((a,b) => b.score - a.score);
        saveBoard(board.slice(0,5));
      }
    }

    // ── Draw ──────────────────────────────────────────────────────
    function draw() {
      if (!food) return; // not yet initialized
      const t = THEMES[themeIdx];

      // Screen shake
      ctx.save();
      if (shakeFrames > 0) {
        shakeFrames--;
        const mag = shakeFrames * 1.2;
        ctx.translate(
          (Math.random() * 2 - 1) * mag,
          (Math.random() * 2 - 1) * mag
        );
      }

      ctx.fillStyle = t.bg;
      ctx.fillRect(-10, -10, canvas.width + 20, canvas.height + 20);

      if (flashFrames > 0) {
        ctx.fillStyle = `rgba(${t.body},${flashFrames * 0.07})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      // Dot grid
      ctx.fillStyle = t.grid;
      for (let x = 0; x <= COLS; x++) {
        for (let y = 0; y <= ROWS; y++) {
          ctx.beginPath(); ctx.arc(x*CELL, y*CELL, 0.75, 0, Math.PI*2); ctx.fill();
        }
      }

      // Portals
      portals.forEach(p => {
        const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 300 + p.pair * Math.PI);
        ctx.globalAlpha = 0.5 + pulse * 0.5;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x*CELL+CELL/2, p.y*CELL+CELL/2, CELL/2-1, 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(p.x*CELL+CELL/2, p.y*CELL+CELL/2, CELL/2-2, 0, Math.PI*2);
        ctx.stroke();
      });

      // Obstacles
      obstacles.forEach(o => {
        ctx.fillStyle = '#6b7280';
        ctx.beginPath(); ctx.roundRect(o.x*CELL+1, o.y*CELL+1, CELL-2, CELL-2, 2); ctx.fill();
        ctx.fillStyle = '#4b5563';
        ctx.fillRect(o.x*CELL+4, o.y*CELL+4, CELL-8, CELL-8);
        ctx.fillStyle = 'rgba(255,255,255,0.08)';
        ctx.fillRect(o.x*CELL+2, o.y*CELL+2, CELL-4, 3);
      });

      // Food (with wobble + glow)
      const wobble = Math.sin(Date.now() / 220) * 1.2;
      ctx.shadowColor = '#ef4444';
      ctx.shadowBlur = 14;
      ctx.fillStyle = '#ef4444';
      ctx.beginPath();
      ctx.ellipse(food.x*CELL+CELL/2, food.y*CELL+CELL/2, CELL/2-2+wobble, CELL/2-2-wobble*0.5, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath();
      ctx.arc(food.x*CELL+CELL/2-3, food.y*CELL+CELL/2-3, 3, 0, Math.PI*2);
      ctx.fill();

      // Extra foods
      extraFoods.forEach(ef => {
        const blink = ef.ttl !== null ? (Math.floor(Date.now() / 150) % 2 === 0) : true;
        if (!blink) return;
        ctx.fillStyle = ef.color;
        ctx.beginPath();
        const cx = ef.x*CELL+CELL/2, cy = ef.y*CELL+CELL/2, r = CELL/2-2;
        if (ef.type === 'golden') {
          // Draw star
          for (let j = 0; j < 5; j++) {
            const a = j * Math.PI*2/5 - Math.PI/2;
            const a2 = a + Math.PI/5;
            j === 0 ? ctx.moveTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r)
                    : ctx.lineTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r);
            ctx.lineTo(cx+Math.cos(a2)*r*0.45, cy+Math.sin(a2)*r*0.45);
          }
          ctx.closePath(); ctx.fill();
        } else {
          ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
        }
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.font = 'bold 10px Courier New'; ctx.textAlign = 'center';
        ctx.fillText(`+${ef.pts}`, cx, cy + 4);
        ctx.textAlign = 'left';
      });

      // Power-up
      if (powerUp) {
        const col = powerUpColor(powerUp.type);
        const pulse = 0.6 + 0.4 * Math.sin(Date.now() / 200);
        ctx.shadowColor = col;
        ctx.shadowBlur = 16;
        ctx.fillStyle = col;
        ctx.globalAlpha = pulse;
        ctx.beginPath();
        ctx.roundRect(powerUp.x*CELL+2, powerUp.y*CELL+2, CELL-4, CELL-4, 4);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 11px Courier New';
        ctx.textAlign = 'center';
        const puIcon = { slow:'S', bonus:'$', shield:'★', shrink:'↓' };
        ctx.fillText(puIcon[powerUp.type] || '?',
          powerUp.x*CELL+CELL/2, powerUp.y*CELL+CELL/2+4);
        ctx.textAlign = 'left';
      }

      // Snakes
      const dying = deathFrames > 0;
      drawSnakeBody(snake, dir, t, dying, shielded, t.accent, true);
      if (twoPlayer) drawSnakeBody(snake2, dir2, t, dying && winner === 'P1', shield2, '#38bdf8');
      if (aiMode && snakeAI) drawSnakeBody(snakeAI, dirAI, t, false, false, '#f97316');

      // Particles
      particles.forEach(p => {
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
      });
      ctx.globalAlpha = 1;

      // Score popups
      scorePopups.forEach(p => {
        ctx.globalAlpha = p.alpha;
        ctx.font = 'bold 13px Courier New';
        ctx.textAlign = 'center';
        ctx.fillStyle = p.color;
        ctx.fillText(p.text, p.x, p.y);
      });
      ctx.globalAlpha = 1;
      ctx.textAlign = 'left';

      // Milestone
      if (milestone && milestone.alpha > 0) {
        ctx.globalAlpha = milestone.alpha;
        ctx.textAlign = 'center';
        ctx.font = 'bold 28px Courier New';
        ctx.fillStyle = '#facc15';
        ctx.fillText(milestone.text, canvas.width/2, canvas.height/2 - 20);
        ctx.globalAlpha = 1;
        ctx.textAlign = 'left';
      }

      // Time attack timer
      if (timeAttack && !gameOver && countdownVal === null) {
        ctx.textAlign = 'left';
        ctx.font = 'bold 13px Courier New';
        ctx.fillStyle = timeLeft <= 10 ? '#ef4444' : '#facc15';
        ctx.fillText(`⏱ ${timeLeft}s`, 8, 18);
      }

      // Combo indicator
      if (combo > 1 && comboAlpha > 0) {
        ctx.globalAlpha = comboAlpha;
        ctx.textAlign = 'right';
        ctx.font = `bold ${16 + combo * 2}px Courier New`;
        ctx.fillStyle = '#facc15';
        ctx.fillText(`×${combo} COMBO`, canvas.width - 8, 22);
        ctx.globalAlpha = 1;
        ctx.textAlign = 'left';
      }

      // Countdown
      if (countdownVal !== null) drawCountdown(countdownVal);

      // Pause
      if (paused) drawPause();

      // Achievement toasts
      toastQueue.forEach((t, i) => {
        const y = canvas.height - 30 - i * 28;
        ctx.globalAlpha = t.alpha;
        ctx.fillStyle = 'rgba(0,0,0,0.75)';
        ctx.beginPath(); ctx.roundRect(8, y - 14, canvas.width - 16, 22, 4); ctx.fill();
        ctx.fillStyle = '#facc15';
        ctx.font = 'bold 11px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText(t.msg, canvas.width / 2, y + 2);
        ctx.textAlign = 'left';
        ctx.globalAlpha = 1;
      });

      // Vignette
      const vign = ctx.createRadialGradient(
        canvas.width/2, canvas.height/2, canvas.width * 0.28,
        canvas.width/2, canvas.height/2, canvas.width * 0.72
      );
      vign.addColorStop(0, 'rgba(0,0,0,0)');
      vign.addColorStop(1, 'rgba(0,0,0,0.4)');
      ctx.fillStyle = vign;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Shield indicator
      if (shielded) {
        ctx.strokeStyle = '#a78bfa'; ctx.lineWidth = 3;
        ctx.strokeRect(2, 2, canvas.width-4, canvas.height-4);
      }

      // Darkness fog-of-war
      if (darkMode && snake && snake.length > 0 && !gameOver) {
        const hx = snake[0].x * CELL + CELL/2;
        const hy = snake[0].y * CELL + CELL/2;
        const radius = CELL * 4.5;
        const fog = ctx.createRadialGradient(hx, hy, radius*0.5, hx, hy, radius);
        fog.addColorStop(0, 'rgba(0,0,0,0)');
        fog.addColorStop(1, 'rgba(0,0,0,0.97)');
        ctx.fillStyle = fog;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      ctx.restore();
    }

    function drawSnakeBody(snk, d, t, dying, shld, accentCol, isPlayer1 = false) {
      const bodyRgb  = isPlayer1 ? customSnakeRgb : t.body;
      const headCol  = isPlayer1 ? customHead : t.head;

      // Body connectors (drawn behind segments for a smooth connected look)
      if (!dying) {
        for (let i = 0; i < snk.length - 1; i++) {
          const a = snk[i], b = snk[i+1];
          if (Math.abs(a.x-b.x) + Math.abs(a.y-b.y) !== 1) continue;
          const alpha = Math.max(0.28, 0.6 - i/snk.length*0.32);
          ctx.fillStyle = shld
            ? `rgba(167,139,250,${alpha})`
            : `rgba(${bodyRgb},${alpha})`;
          const ax = a.x*CELL + CELL/2, ay = a.y*CELL + CELL/2;
          const bx = b.x*CELL + CELL/2, by = b.y*CELL + CELL/2;
          const W = 10;
          if (a.x === b.x) {
            ctx.fillRect(ax - W/2, Math.min(ay,by), W, Math.abs(ay-by));
          } else {
            ctx.fillRect(Math.min(ax,bx), ay - W/2, Math.abs(ax-bx), W);
          }
        }
      }

      snk.forEach((seg, i) => {
        if (dying) {
          ctx.fillStyle = i % 2 === 0 ? '#ef4444' : '#7f1d1d';
        } else if (shld) {
          ctx.fillStyle = i === 0 ? '#c4b5fd' : `rgba(167,139,250,${Math.max(0.4, 1 - i/snk.length*0.6)})`;
        } else {
          ctx.fillStyle = i === 0 ? headCol : `rgba(${bodyRgb},${Math.max(0.4, 1 - i/snk.length*0.6)})`;
        }
        if (i === 0 && !dying) {
          // Head glow
          ctx.shadowColor = headCol;
          ctx.shadowBlur = 10;
          // Head squash/stretch in direction of travel
          const stretch = 2.5;
          const sx = d.x !== 0 ? stretch : -stretch * 0.5;
          const sy = d.y !== 0 ? stretch : -stretch * 0.5;
          ctx.beginPath();
          ctx.roundRect(seg.x*CELL+1-sx, seg.y*CELL+1-sy, CELL-2+sx*2, CELL-2+sy*2, 4);
          ctx.fill();
          ctx.shadowBlur = 0;
        } else {
          const pad = i === 0 ? 1 : 2;
          ctx.beginPath();
          ctx.roundRect(seg.x*CELL+pad, seg.y*CELL+pad, CELL-pad*2, CELL-pad*2, i===0?4:3);
          ctx.fill();
        }
      });
      if (!dying) {
        const h = snk[0];
        ctx.fillStyle = t.bg;
        const cx = h.x*CELL+CELL/2 + d.x*4, cy = h.y*CELL+CELL/2 + d.y*4;
        ctx.beginPath(); ctx.arc(cx+d.y*4, cy+d.x*4, 2.5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx-d.y*4, cy-d.x*4, 2.5, 0, Math.PI*2); ctx.fill();
      }
    }

    function drawCountdown(n) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.textAlign = 'center';
      ctx.fillStyle = THEMES[themeIdx].accent;
      ctx.font = `bold ${n === 0 ? 60 : 80}px Courier New`;
      ctx.fillText(n === 0 ? 'GO!' : n, canvas.width/2, canvas.height/2 + 28);
      if (n > 0) {
        ctx.fillStyle = '#aaa';
        ctx.font = '12px Courier New';
        ctx.fillText('hold SHIFT to sprint', canvas.width/2, canvas.height/2 + 60);
      }
      ctx.textAlign = 'left';
    }

    function drawStartScreen() {
      ctx.fillStyle = 'rgba(0,0,0,0.72)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.textAlign = 'center';
      ctx.fillStyle = THEMES[themeIdx].accent;
      ctx.font = 'bold 48px Courier New';
      ctx.fillText('SNAKE', canvas.width/2, canvas.height/2 - 18);
      ctx.fillStyle = '#ccc';
      ctx.font = '14px Courier New';
      ctx.fillText('PRESS ANY KEY OR CLICK TO START', canvas.width/2, canvas.height/2 + 22);
      ctx.textAlign = 'left';
    }

    function drawPause() {
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.textAlign = 'center';
      ctx.fillStyle = '#eee';
      ctx.font = 'bold 40px Courier New';
      ctx.fillText('PAUSED', canvas.width/2, canvas.height/2);
      ctx.font = '14px Courier New';
      ctx.fillStyle = '#888';
      ctx.fillText('P or ESC to resume', canvas.width/2, canvas.height/2 + 30);
      ctx.textAlign = 'left';
    }

    function drawOverlay() {
      ctx.fillStyle = 'rgba(0,0,0,0.82)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.textAlign = 'center';

      if (twoPlayer && winner) {
        ctx.fillStyle = winner === 'P1' ? THEMES[themeIdx].accent : '#38bdf8';
        ctx.font = 'bold 32px Courier New';
        ctx.fillText(`${winner} WINS!`, canvas.width/2, 110);
      } else {
        ctx.fillStyle = '#ef4444';
        ctx.font = 'bold 36px Courier New';
        ctx.fillText('GAME OVER', canvas.width/2, 110);
      }

      ctx.fillStyle = '#eee';
      ctx.font = '16px Courier New';
      ctx.fillText(`Score: ${score}`, canvas.width/2, 148);
      ctx.fillText(`Best:  ${highScore}`, canvas.width/2, 170);

      // Leaderboard
      const board = getBoard();
      if (board.length) {
        ctx.font = '11px Courier New';
        ctx.fillStyle = '#facc15';
        ctx.fillText('TOP SCORES', canvas.width/2, 196);
        ctx.fillStyle = '#aaa';
        board.forEach((e, i) => {
          ctx.fillText(`${i+1}. ${e.initials}  ${e.score}`, canvas.width/2, 212 + i*16);
        });
      }

      // Difficulty
      ctx.font = '11px Courier New'; ctx.fillStyle = '#aaa';
      ctx.fillText('DIFFICULTY', canvas.width/2, 304);
      DIFF_ORDER.forEach((d, i) => {
        const bx = 38 + i*110, by = 312, bw = 90, bh = 26;
        const active = difficulty === d;
        ctx.fillStyle = active ? THEMES[themeIdx].accent : '#1e1e3a';
        ctx.strokeStyle = active ? THEMES[themeIdx].accent : '#666';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 4); ctx.fill(); ctx.stroke();
        ctx.fillStyle = active ? '#0f0f1a' : '#ccc';
        ctx.font = 'bold 11px Courier New';
        ctx.fillText(DIFFICULTIES[d].label, bx+bw/2, by+18);
      });

      // Play again
      const bx = canvas.width/2 - 70, by = 356;
      ctx.fillStyle = THEMES[themeIdx].accent;
      ctx.beginPath(); ctx.roundRect(bx, by, 140, 34, 6); ctx.fill();
      ctx.fillStyle = '#0f0f1a';
      ctx.font = 'bold 15px Courier New';
      ctx.fillText('PLAY AGAIN', canvas.width/2, by+23);

      // Share / score card button
      ctx.fillStyle = '#1e1e3a';
      ctx.strokeStyle = '#555'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.roundRect(canvas.width/2 - 40, by+42, 80, 22, 4); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#aaa';
      ctx.font = '11px Courier New';
      ctx.fillText('SHARE SCORE', canvas.width/2, by+57);

      ctx.textAlign = 'left';
    }

    // ── UI buttons ────────────────────────────────────────────────
    function updateDiffLabel() {
      diffLabel.textContent = DIFFICULTIES[difficulty].label;
      const cols = { easy:'#4ade80', medium:'#facc15', hard:'#ef4444' };
      diffLabel.style.color = cols[difficulty];
    }

    function setBtn(btn, state) { btn.classList.toggle('on', state); }

    wallsBtn.addEventListener('click', () => {
      wallsOn = !wallsOn;
      wallsBtn.textContent = `WALLS: ${wallsOn ? 'ON' : 'OFF'}`;
      setBtn(wallsBtn, wallsOn);
    });

    mazeBtn.addEventListener('click', () => {
      mazeMode = !mazeMode;
      mazeBtn.textContent = `MAZE: ${mazeMode ? 'ON' : 'OFF'}`;
      setBtn(mazeBtn, mazeMode);
      init();
    });

    aiBtn.addEventListener('click', () => {
      aiMode = !aiMode;
      aiBtn.textContent = `AI: ${aiMode ? 'ON' : 'OFF'}`;
      setBtn(aiBtn, aiMode);
      init();
    });

    portalBtn.addEventListener('click', () => {
      portalsOn = !portalsOn;
      portalBtn.textContent = `PORTALS: ${portalsOn ? 'ON' : 'OFF'}`;
      setBtn(portalBtn, portalsOn);
      init();
    });

    timeBtn.addEventListener('click', () => {
      timeAttack = !timeAttack;
      timeBtn.textContent = `TIME: ${timeAttack ? 'ON' : 'OFF'}`;
      setBtn(timeBtn, timeAttack);
      init();
    });

    darkBtn.addEventListener('click', () => {
      darkMode = !darkMode;
      darkBtn.textContent = `DARK: ${darkMode ? 'ON' : 'OFF'}`;
      setBtn(darkBtn, darkMode);
    });

    themeBtn.addEventListener('click', () => {
      themeIdx = (themeIdx + 1) % THEMES.length;
      localStorage.setItem('snakeTheme', themeIdx);
      applyTheme();
    });

    modeBtn.addEventListener('click', () => {
      twoPlayer = !twoPlayer;
      modeBtn.textContent = twoPlayer ? '2 PLAYER' : '1 PLAYER';
      init();
    });

    // ── Input ─────────────────────────────────────────────────────
    document.addEventListener('keyup', e => {
      if (e.key === 'Shift' && shiftHeld) {
        shiftHeld = false;
        if (!gameOver && countdownVal === null && !paused) restartInterval();
        updateStaminaBar();
      }
    });

    document.addEventListener('keydown', e => {
      if (needsStart) return; // waiting for first gesture (handled by onFirstGesture)
      if (e.key === 'Shift' && !shiftHeld && !gameOver && countdownVal === null && !paused) {
        shiftHeld = true;
        if (stamina > 0) {
          restartInterval();
          boostUses++;
          if (boostUses >= 10) unlockAchievement('speed_demon');
        }
        updateStaminaBar();
        return;
      }
      if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') {
        if (!gameOver && countdownVal === null) {
          paused = !paused;
          if (!paused) draw(); else { draw(); drawPause(); }
        }
        return;
      }
      if (gameOver && (e.key === 'Enter' || e.key === ' ')) { init(); return; }
      if (paused) return;

      // P1: WASD
      const p1map = {
        w: {x:0,y:-1}, W: {x:0,y:-1},
        s: {x:0,y:1},  S: {x:0,y:1},
        a: {x:-1,y:0}, A: {x:-1,y:0},
        d: {x:1,y:0},  D: {x:1,y:0},
      };
      // P2 (or solo arrows): Arrow keys
      const p2map = {
        ArrowUp:    {x:0,y:-1}, ArrowDown:  {x:0,y:1},
        ArrowLeft:  {x:-1,y:0}, ArrowRight: {x:1,y:0},
      };

      const nd1 = p1map[e.key];
      if (nd1 && (nd1.x !== -dir.x || nd1.y !== -dir.y)) nextDir = nd1;

      if (twoPlayer) {
        const nd2 = p2map[e.key];
        if (nd2 && (nd2.x !== -dir2.x || nd2.y !== -dir2.y)) nextDir2 = nd2;
      } else {
        const nd = p2map[e.key];
        if (nd && (nd.x !== -dir.x || nd.y !== -dir.y)) nextDir = nd;
      }

      if (e.key.startsWith('Arrow')) e.preventDefault();
    });

    // Canvas click
    canvas.addEventListener('click', e => {
      if (!gameOver) return;
      const rect = canvas.getBoundingClientRect();
      const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
      const my = (e.clientY - rect.top)  * (canvas.height / rect.height);
      DIFF_ORDER.forEach((d, i) => {
        const bx = 38 + i*110, by = 312, bw = 90, bh = 26;
        if (mx >= bx && mx <= bx+bw && my >= by && my <= by+bh) {
          difficulty = d; updateDiffLabel(); drawOverlay();
        }
      });
      const bx = canvas.width/2 - 70, by = 356;
      if (mx >= bx && mx <= bx+140 && my >= by && my <= by+34) init();
      // Share button
      const sbx = canvas.width/2 - 40, sby = by+42;
      if (mx >= sbx && mx <= sbx+80 && my >= sby && my <= sby+22) downloadScoreCard();
    });

    // D-pad
    function pressDir(dx, dy) {
      if (dx !== -dir.x || dy !== -dir.y) nextDir = { x:dx, y:dy };
    }
    document.getElementById('btn-up').addEventListener('touchstart',    e => { e.preventDefault(); pressDir(0,-1); }, {passive:false});
    document.getElementById('btn-down').addEventListener('touchstart',  e => { e.preventDefault(); pressDir(0,1);  }, {passive:false});
    document.getElementById('btn-left').addEventListener('touchstart',  e => { e.preventDefault(); pressDir(-1,0); }, {passive:false});
    document.getElementById('btn-right').addEventListener('touchstart', e => { e.preventDefault(); pressDir(1,0);  }, {passive:false});

    // Idle animation loop (food wobble, power-up pulse redraw)
    function idleDraw() {
      if (!gameOver && !paused && countdownVal === null) {
        draw();
        if (needsStart) drawStartScreen();
      }
      requestAnimationFrame(idleDraw);
    }

    applyTheme();
    updateDiffLabel();
    // Pre-load high score before first init so it shows immediately
    highScoreEl.textContent = localStorage.getItem('snakeHigh') || '0';
    init();
    requestAnimationFrame(idleDraw);
  </script>
</body>
</html>
